services:
  ssl-init:
    image: alpine:3.20
    restart: "no"
    command: >
      sh -c "
      apk add --no-cache openssl >/dev/null &&
      mkdir -p /ssl &&
      if [ ! -f /ssl/cert.pem ] || [ ! -f /ssl/key.pem ]; then
        openssl req -x509 -nodes -newkey rsa:2048 -days 365 -keyout /ssl/key.pem -out /ssl/cert.pem -subj '/CN=localhost' >/dev/null 2>&1 &&
        echo 'Generated development self-signed TLS certs in nginx/ssl/' ;
      else
        echo 'Using existing TLS certs in nginx/ssl/' ;
      fi"
    volumes:
      - ./nginx/ssl:/ssl
    networks:
      - meritforge-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meritforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meritforge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-meritforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meritforge} -d ${POSTGRES_DB:-meritforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meritforge-network

  db-dev-tools:
    image: alpine/socat
    profiles: ["dev-tools"]
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:db:5432
    ports:
      - "5432:5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meritforge-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meritforge-network

  redis-dev-tools:
    image: alpine/socat
    profiles: ["dev-tools"]
    command: tcp-listen:6379,fork,reuseaddr tcp-connect:redis:6379
    ports:
      - "6379:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - meritforge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-meritforge}:${POSTGRES_PASSWORD:-meritforge_secret}@db:5432/${POSTGRES_DB:-meritforge}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      PASSWORD_PEPPER_CURRENT: ${PASSWORD_PEPPER_CURRENT:-}
      PASSWORD_PEPPER_PREVIOUS: ${PASSWORD_PEPPER_PREVIOUS:-}
      REFRESH_TOKEN_HASH_KEYS: ${REFRESH_TOKEN_HASH_KEYS:-}
      REFRESH_TOKEN_HASH_ACTIVE_KEY_ID: ${REFRESH_TOKEN_HASH_ACTIVE_KEY_ID:-legacy-sha256}
      REFRESH_TOKEN_HASH_ROTATION_DAYS: ${REFRESH_TOKEN_HASH_ROTATION_DAYS:-180}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      STEP_UP_COOKIE_NAME: ${STEP_UP_COOKIE_NAME:-step_up_token}
      STEP_UP_EXPIRE_MINUTES: ${STEP_UP_EXPIRE_MINUTES:-5}
      USER_RATE_LIMIT_PER_MINUTE: ${USER_RATE_LIMIT_PER_MINUTE:-120}
      RATE_LIMIT_FAIL_CLOSED: ${RATE_LIMIT_FAIL_CLOSED:-false}
      IDEMPOTENCY_FAIL_CLOSED: ${IDEMPOTENCY_FAIL_CLOSED:-false}
      INTEGRATION_HMAC_KEYS: ${INTEGRATION_HMAC_KEYS:-integration-key-a:integration-secret-a,integration-key-b:integration-secret-b}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost,http://localhost:3000,http://localhost}
      DEBUG: ${DEBUG:-false}
      SEED_DEV_PASSWORD: ${SEED_DEV_PASSWORD:-MeritForgeDev!2026}
      PYTHONPATH: /app
      ENABLE_BACKEND_COVERAGE: ${ENABLE_BACKEND_COVERAGE:-true}
      COVERAGE_FILE: /coverage/.coverage.backend
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/scripts:/app/scripts:ro
      - backend_uploads:/app/uploads
      - backend_coverage:/coverage
    command: >
      sh -c "
      alembic upgrade head &&
      if [ \"$${ENABLE_BACKEND_COVERAGE}\" = \"true\" ]; then
        coverage run --parallel-mode -m uvicorn app.main:app --host 0.0.0.0 --port 8000;
      else
        uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meritforge-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  db-test:
    image: postgres:16-alpine
    profiles:
      - test
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER:-meritforge_test}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-meritforge_test_secret}
      POSTGRES_DB: ${TEST_POSTGRES_DB:-meritforge_test}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEST_POSTGRES_USER:-meritforge_test} -d ${TEST_POSTGRES_DB:-meritforge_test}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meritforge-network

  redis-test:
    image: redis:7-alpine
    profiles:
      - test
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meritforge-network

  backend-test-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles:
      - test
    environment:
      DATABASE_URL: postgresql+psycopg://${TEST_POSTGRES_USER:-meritforge_test}:${TEST_POSTGRES_PASSWORD:-meritforge_test_secret}@db-test:5432/${TEST_POSTGRES_DB:-meritforge_test}
      REDIS_URL: redis://redis-test:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      PASSWORD_PEPPER_CURRENT: ${PASSWORD_PEPPER_CURRENT:-}
      PASSWORD_PEPPER_PREVIOUS: ${PASSWORD_PEPPER_PREVIOUS:-}
      REFRESH_TOKEN_HASH_KEYS: ${REFRESH_TOKEN_HASH_KEYS:-}
      REFRESH_TOKEN_HASH_ACTIVE_KEY_ID: ${REFRESH_TOKEN_HASH_ACTIVE_KEY_ID:-legacy-sha256}
      REFRESH_TOKEN_HASH_ROTATION_DAYS: ${REFRESH_TOKEN_HASH_ROTATION_DAYS:-180}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      STEP_UP_COOKIE_NAME: ${STEP_UP_COOKIE_NAME:-step_up_token}
      STEP_UP_EXPIRE_MINUTES: ${STEP_UP_EXPIRE_MINUTES:-5}
      USER_RATE_LIMIT_PER_MINUTE: ${USER_RATE_LIMIT_PER_MINUTE:-120}
      RATE_LIMIT_FAIL_CLOSED: ${RATE_LIMIT_FAIL_CLOSED:-false}
      IDEMPOTENCY_FAIL_CLOSED: ${IDEMPOTENCY_FAIL_CLOSED:-false}
      INTEGRATION_HMAC_KEYS: ${INTEGRATION_HMAC_KEYS:-integration-key-a:integration-secret-a,integration-key-b:integration-secret-b}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost,http://localhost:3000,http://localhost}
      DEBUG: ${DEBUG:-false}
      SEED_DEV_PASSWORD: ${SEED_DEV_PASSWORD:-MeritForgeDev!2026}
      PYTHONPATH: /app
      ENABLE_BACKEND_COVERAGE: ${ENABLE_BACKEND_COVERAGE:-true}
      COVERAGE_FILE: /coverage/.coverage.backend
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/scripts:/app/scripts:ro
      - backend_uploads:/app/uploads
      - backend_coverage:/coverage
    command: >
      sh -c "
      alembic upgrade head &&
      if [ \"$${ENABLE_BACKEND_COVERAGE}\" = \"true\" ]; then
        coverage run --parallel-mode -m uvicorn app.main:app --host 0.0.0.0 --port 8000;
      else
        uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - meritforge-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles:
      - test
    environment:
      DATABASE_URL: postgresql+psycopg://${TEST_POSTGRES_USER:-meritforge_test}:${TEST_POSTGRES_PASSWORD:-meritforge_test_secret}@db-test:5432/${TEST_POSTGRES_DB:-meritforge_test}
      REDIS_URL: redis://redis-test:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      PASSWORD_PEPPER_CURRENT: ${PASSWORD_PEPPER_CURRENT:-}
      PASSWORD_PEPPER_PREVIOUS: ${PASSWORD_PEPPER_PREVIOUS:-}
      REFRESH_TOKEN_HASH_KEYS: ${REFRESH_TOKEN_HASH_KEYS:-}
      REFRESH_TOKEN_HASH_ACTIVE_KEY_ID: ${REFRESH_TOKEN_HASH_ACTIVE_KEY_ID:-legacy-sha256}
      REFRESH_TOKEN_HASH_ROTATION_DAYS: ${REFRESH_TOKEN_HASH_ROTATION_DAYS:-180}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      STEP_UP_COOKIE_NAME: ${STEP_UP_COOKIE_NAME:-step_up_token}
      STEP_UP_EXPIRE_MINUTES: ${STEP_UP_EXPIRE_MINUTES:-5}
      USER_RATE_LIMIT_PER_MINUTE: ${USER_RATE_LIMIT_PER_MINUTE:-120}
      RATE_LIMIT_FAIL_CLOSED: ${RATE_LIMIT_FAIL_CLOSED:-false}
      IDEMPOTENCY_FAIL_CLOSED: ${IDEMPOTENCY_FAIL_CLOSED:-false}
      INTEGRATION_HMAC_KEYS: ${INTEGRATION_HMAC_KEYS:-integration-key-a:integration-secret-a,integration-key-b:integration-secret-b}
      API_BASE_URL: http://backend-test-server:8000
      PYTHONPATH: /app
      COVERAGE_RCFILE: /tests/.coveragerc
    working_dir: /tests
    command: >
      sh -c "coverage erase &&
      python /app/scripts/seed_dev_users.py &&
      coverage run -m pytest unit_tests API_tests -v &&
      coverage combine . /coverage || true &&
      coverage report &&
      coverage html"
    volumes:
      - ./backend:/app:ro
      - ./unit_tests:/tests/unit_tests:ro
      - ./API_tests:/tests/API_tests:ro
      - ./.coveragerc:/tests/.coveragerc:ro
      - ./coverage_html:/tests/coverage_html
      - backend_coverage:/coverage
    depends_on:
      db-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      backend-test-server:
        condition: service_healthy
    networks:
      - meritforge-network

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    profiles:
      - test
    working_dir: /app
    command: sh -c "rm -rf /tmp/frontend-tests && cp -R /app /tmp/frontend-tests && cd /tmp/frontend-tests && npm ci && npm run test:run"
    environment:
      NODE_ENV: test
    volumes:
      - ./frontend:/app:ro
    networks:
      - meritforge-network

  test:
    image: alpine:3.20
    profiles:
      - test
    command: ["sh", "-c", "echo 'backend-test and frontend-test completed successfully'"]
    depends_on:
      backend-test:
        condition: service_completed_successfully
      frontend-test:
        condition: service_completed_successfully
    networks:
      - meritforge-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-meritforge}:${POSTGRES_PASSWORD:-meritforge_secret}@db:5432/${POSTGRES_DB:-meritforge}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      PASSWORD_PEPPER_CURRENT: ${PASSWORD_PEPPER_CURRENT:-}
      PASSWORD_PEPPER_PREVIOUS: ${PASSWORD_PEPPER_PREVIOUS:-}
      REFRESH_TOKEN_HASH_KEYS: ${REFRESH_TOKEN_HASH_KEYS:-}
      REFRESH_TOKEN_HASH_ACTIVE_KEY_ID: ${REFRESH_TOKEN_HASH_ACTIVE_KEY_ID:-legacy-sha256}
      REFRESH_TOKEN_HASH_ROTATION_DAYS: ${REFRESH_TOKEN_HASH_ROTATION_DAYS:-180}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      STEP_UP_COOKIE_NAME: ${STEP_UP_COOKIE_NAME:-step_up_token}
      STEP_UP_EXPIRE_MINUTES: ${STEP_UP_EXPIRE_MINUTES:-5}
      USER_RATE_LIMIT_PER_MINUTE: ${USER_RATE_LIMIT_PER_MINUTE:-120}
      RATE_LIMIT_FAIL_CLOSED: ${RATE_LIMIT_FAIL_CLOSED:-false}
      IDEMPOTENCY_FAIL_CLOSED: ${IDEMPOTENCY_FAIL_CLOSED:-false}
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meritforge-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-meritforge}:${POSTGRES_PASSWORD:-meritforge_secret}@db:5432/${POSTGRES_DB:-meritforge}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      PASSWORD_PEPPER_CURRENT: ${PASSWORD_PEPPER_CURRENT:-}
      PASSWORD_PEPPER_PREVIOUS: ${PASSWORD_PEPPER_PREVIOUS:-}
      REFRESH_TOKEN_HASH_KEYS: ${REFRESH_TOKEN_HASH_KEYS:-}
      REFRESH_TOKEN_HASH_ACTIVE_KEY_ID: ${REFRESH_TOKEN_HASH_ACTIVE_KEY_ID:-legacy-sha256}
      REFRESH_TOKEN_HASH_ROTATION_DAYS: ${REFRESH_TOKEN_HASH_ROTATION_DAYS:-180}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-access_token}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-refresh_token}
      STEP_UP_COOKIE_NAME: ${STEP_UP_COOKIE_NAME:-step_up_token}
      STEP_UP_EXPIRE_MINUTES: ${STEP_UP_EXPIRE_MINUTES:-5}
      USER_RATE_LIMIT_PER_MINUTE: ${USER_RATE_LIMIT_PER_MINUTE:-120}
      RATE_LIMIT_FAIL_CLOSED: ${RATE_LIMIT_FAIL_CLOSED:-false}
      IDEMPOTENCY_FAIL_CLOSED: ${IDEMPOTENCY_FAIL_CLOSED:-false}
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meritforge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_APP_NAME: ${VITE_APP_NAME:-MeritForge}
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./nginx/ssl:/certs:ro
    depends_on:
      - backend
    networks:
      - meritforge-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    command: >
      sh -c "
      [ -f /etc/nginx/ssl/cert.pem ] && [ -f /etc/nginx/ssl/key.pem ] ||
      { echo 'ERROR: TLS files missing (/etc/nginx/ssl/cert.pem, /etc/nginx/ssl/key.pem).'; exit 1; };
      nginx -g 'daemon off;'"
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - meritforge-network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_coverage:

networks:
  meritforge-network:
    driver: bridge
